name: build

on:
  push:
    branches:
      - master

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 'latest'
      - run: npm ci
      - run: npm test
  get_tag:
    name: Get Tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.get_tag.outputs.tag }}
      tag_exists: ${{ steps.check_tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Get tag
        id: get_tag
        run: |
          tag=$(git log -1 --pretty=%B | tr '\n' ' ' | sed -nE 's/.*(v[0-9]+\.[0-9]+\.[0-9]+).*/\1/p')
          if [ -z "$tag" ]; then
            echo "No semver tag found in the latest commit message"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse --verify --quiet "refs/tags/${{ steps.get_tag.outputs.tag }}"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
  tag:
    name: Apply Tag
    if: ${{ needs.get_tag.outputs.tag_exists == 'false' }}
    runs-on: ubuntu-latest
    needs: [get_tag, test]
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6
    - name: Create release
      run: gh release create "${{ needs.get_tag.outputs.tag }}" --target "$GITHUB_SHA" --title "${{ needs.get_tag.outputs.tag }}" --generate-notes
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: tag
    permissions:
      contents: read
      id-token: write
    steps:
    - uses: actions/checkout@v6
    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: 'latest'
        registry-url: https://registry.npmjs.org/
        package-manager-cache: false
    - name: Install NPM Packages
      run: npm ci
    - name: Deploy Release
      run: npm publish
