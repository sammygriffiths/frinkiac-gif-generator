name: run-tests

on: pull_request

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 'latest'
    - name: Install dependencies
      run: npm ci
    - name: Run tests
      run: npm test
